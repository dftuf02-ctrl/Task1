# API gateway: a single NGINX Ingress fronts both services and routes by
# path. /auth and /tasks → tasks-service; /reports → reports-service.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskflow-gateway
  namespace: taskflow-cap
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    # Edge audit: log the correlation id and upstream on every request.
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Gateway: taskflow-nginx";
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: tasks-service
                port:
                  number: 80
          - path: /api/v1/tasks
            pathType: Prefix
            backend:
              service:
                name: tasks-service
                port:
                  number: 80
          - path: /api/v1/reports
            pathType: Prefix
            backend:
              service:
                name: reports-service
                port:
                  number: 80
