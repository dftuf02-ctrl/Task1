apiVersion: v1
kind: ConfigMap
metadata:
  name: taskflow-config
  namespace: taskflow-cap
data:
  NODE_ENV: "production"
  PORT: "3001"
  CORS_ORIGIN: "http://localhost"
  REDIS_URL: "redis://redis:6379"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX: "100"
  AUTH_RATE_LIMIT_MAX: "10"
  LOG_LEVEL: "info"
  WORKER_METRICS_PORT: "9101"
  PASSWORD_HASH: "native"
