# TEMPLATE ONLY — do not put real values here or commit a filled-in copy.
# The real Secret is created imperatively at deploy time (see deploy.ps1),
# which sources values from the environment / your .env and generates the
# JWT secrets, so no plaintext secret ever lives in the repo.
#
# Manual equivalent:
# The pods run NODE_ENV=production, which REQUIRES the service-role key — the
# backend refuses to start on the anon key. Provide SUPABASE_SERVICE_ROLE_KEY.
#   kubectl create secret generic taskflow-secrets -n taskflow \
#     --from-literal=SUPABASE_URL=... \
#     --from-literal=SUPABASE_SERVICE_ROLE_KEY=... \
#     --from-literal=JWT_ACCESS_SECRET=... \
#     --from-literal=JWT_REFRESH_SECRET=...
apiVersion: v1
kind: Secret
metadata:
  name: taskflow-secrets
  namespace: taskflow
type: Opaque
stringData:
  SUPABASE_URL: "https://your-project-id.supabase.co"
  SUPABASE_SERVICE_ROLE_KEY: "your-supabase-service-role-key"
  JWT_ACCESS_SECRET: "generated-at-deploy-time"
  JWT_REFRESH_SECRET: "generated-at-deploy-time"
