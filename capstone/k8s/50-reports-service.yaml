apiVersion: apps/v1
kind: Deployment
metadata:
  name: reports-service
  namespace: taskflow-cap
  labels:
    app: reports-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reports-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: reports-service
    spec:
      serviceAccountName: reports-service
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: taskflow-api:cap
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: SERVICE_ROLE
              value: "reports"   # serves /reports + runs the Redis Streams consumer
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: TMPDIR
              value: "/tmp"
          envFrom:
            - configMapRef:
                name: taskflow-config
            - secretRef:
                name: taskflow-secrets
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "8"]
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: reports-service
  namespace: taskflow-cap
  labels:
    app: reports-service
spec:
  selector:
    app: reports-service
  ports:
    - name: http
      port: 80
      targetPort: 3001
  type: ClusterIP
