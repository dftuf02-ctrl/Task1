# Tells Grafana to load dashboard JSON files from disk on startup.
apiVersion: 1

providers:
  - name: 'TaskFlow'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
