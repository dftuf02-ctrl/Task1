# Prometheus scrape configuration for TaskFlow.
#
# Targets use Docker Compose service DNS names (api, worker). For a
# non-Docker local run, swap these for host.docker.internal:<port> or
# run Prometheus with --config and point at localhost:3001 / :9101.
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'taskflow-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['api:3001']
        labels:
          component: api

  - job_name: 'taskflow-worker'
    metrics_path: /metrics
    static_configs:
      - targets: ['worker:9101']
        labels:
          component: worker

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
